<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniConnect — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0d1b2a; --navy-mid: #1a2e45;
      --gold: #c9a84c; --cream: #f5f0e8;
      --cream-dark: #ede5d6; --border: #e2d9cc;
      --text-dark: #0d1b2a; --text-muted: #5a6a7a;
      --success: #1e7e5c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(13,27,42,0.1);
    }

    .card-top {
      border-top: 3px solid var(--gold);
      border-radius: 16px 16px 0 0;
      margin: -2.5rem -2.5rem 2rem -2.5rem;
      padding: 0;
    }

    .brand {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text-dark);
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      line-height: 1.55;
    }

    .field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1.25rem; }
    .field label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dark); }
    .field input {
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--cream-dark);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(13,27,42,0.08); }
    .field input::placeholder { color: #b0b8c4; }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--navy);
      color: var(--gold);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 1.25rem;
    }
    .btn:hover { background: var(--navy-mid); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; pointer-events: none; }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--navy); }

    /* Success state */
    .success-state { display: none; text-align: center; }
    .success-icon {
      width: 56px; height: 56px;
      background: rgba(30,126,92,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.25rem;
    }
    .success-state h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 0.5rem; }
    .success-state p { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-top"></div>

    <div class="brand">
      <div class="brand-name">UniConnect</div>
    </div>

    <div id="form-state">
      <h1>Forgot password?</h1>
      <p class="subtitle">Enter your university email and we'll send you a reset link.</p>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@university.edu" autocomplete="email"/>
      </div>

      <button class="btn" onclick="handleSubmit()">Send Reset Link</button>
      <a href="login.html" class="back-link">← Back to login</a>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">✉️</div>
      <h2>Check your email</h2>
      <p>We sent a password reset link to <strong id="sent-email"></strong>. Check your inbox and follow the instructions.</p>
      <a href="login.html" class="back-link">← Back to login</a>
    </div>
  </div>

  <script>
    function handleSubmit() {
      const email = document.getElementById('email').value.trim();
      if (!email) { document.getElementById('email').focus(); return; }

      document.getElementById('sent-email').textContent = email;
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
    }
  </script>

</body>
</html>
